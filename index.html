<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>VULCAN FRESH MOBILE</title>
    <style>
        :root {
            --bg: #0b0c10;
            --panel: #1f2833;
            --neon-teal: #00f2ea; 
            --neon-purple: #7a00ff;
            --text: #ffffff;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            padding: 20px; display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 450px; }

        .header h1 { 
            font-size: 28px; text-align: center; color: var(--neon-teal);
            text-shadow: 0 0 10px var(--neon-teal); text-transform: uppercase;
        }

        .box { background: var(--panel); border: 1px solid #444; padding: 20px; border-radius: 8px; margin-bottom: 20px; }

        input { 
            width: 100%; background: #000; border: 1px solid var(--neon-teal); 
            color: var(--neon-teal); padding: 12px; border-radius: 4px; 
            margin-bottom: 15px; box-sizing: border-box; font-family: monospace;
        }

        .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
        
        button { 
            flex: 1; padding: 12px; border: 1px solid #444; border-radius: 4px;
            cursor: pointer; font-weight: bold; transition: 0.2s; background: #151515; color: white;
        }

        .btn-main { border-color: var(--neon-teal); color: var(--neon-teal); }
        .btn-save { width: 100%; border-color: var(--neon-purple); color: var(--neon-purple); margin-top: 5px; }
        button:active { transform: scale(0.98); background: #222; }

        .item { 
            background: rgba(255,255,255,0.05); padding: 12px; margin-bottom: 8px;
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
            border-left: 3px solid var(--neon-teal); cursor: pointer;
        }

        .del-btn { color: #ff4444; font-weight: bold; padding: 5px 10px; }
        .hidden { display: none; }
        
        #reader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 100; padding: 20px; box-sizing: border-box; 
        }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <div class="header"><h1>VULCAN FRESH</h1></div>
    
    <div class="box">
        <input type="text" id="mail-addr" readonly value="SYNCING VULCAN...">
        <div class="btn-row">
            <button onclick="generateNewEmail()">CHANGE</button>
            <button class="btn-main" onclick="copyEmail()">COPY</button>
        </div>
        <button class="btn-save" onclick="saveCurrentSession()">💾 SAVE SESSION</button>
    </div>

    <h3 style="color: #666; font-size: 12px; text-transform: uppercase;">Saved Sessions</h3>
    <div id="session-list"></div>
</div>

<div id="reader" class="hidden">
    <button onclick="closeInbox()" style="color: var(--neon-teal); margin-bottom: 20px;">← BACK</button>
    <h2 id="read-email-address" style="font-size: 14px; color: var(--neon-teal);"></h2>
    <button class="btn-main" style="width:100%; margin-bottom: 15px;" onclick="refreshInbox()">REFRESH INBOX</button>
    <div id="message-list"></div>
</div>

<script>
    const API_URL = "https://api.mail.tm";
    let activeEmail = "";

    // 1. Initial Load
    window.onload = () => {
        generateNewEmail();
        loadStoredSessions();
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    };

    async function generateNewEmail() {
        try {
            const domainRes = await fetch(`${API_URL}/domains`);
            const domainData = await domainRes.json();
            const domain = domainData["hydra:member"][0].domain;
            activeEmail = `vlc_${Math.random().toString(36).substring(7)}@${domain}`;
            document.getElementById('mail-addr').value = activeEmail;
        } catch (e) { document.getElementById('mail-addr').value = "API OFFLINE"; }
    }

    function saveCurrentSession() {
        let sessions = JSON.parse(localStorage.getItem('vulcan_sessions') || "[]");
        if (!sessions.includes(activeEmail)) {
            sessions.push(activeEmail);
            localStorage.setItem('vulcan_sessions', JSON.stringify(sessions));
            loadStoredSessions();
        }
    }

    function loadStoredSessions() {
        const list = document.getElementById('session-list');
        const sessions = JSON.parse(localStorage.getItem('vulcan_sessions') || "[]");
        list.innerHTML = sessions.length ? "" : "<p style='color:#444'>No sessions saved.</p>";
        sessions.forEach(email => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span onclick="openInbox('${email}')">${email}</span><span class="del-btn" onclick="deleteSession('${email}')">&times;</span>`;
            list.appendChild(div);
        });
    }

    function openInbox(email) {
        activeEmail = email;
        document.getElementById('read-email-address').innerText = email;
        document.getElementById('main-view').classList.add('hidden');
        document.getElementById('reader').classList.remove('hidden');
        refreshInbox();
    }

    function closeInbox() {
        document.getElementById('reader').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
    }

    async function refreshInbox() {
        const list = document.getElementById('message-list');
        list.innerHTML = "<p style='color:cyan'>Scanning...</p>";
        // Note: mail.tm requires account creation/token to read real mail. 
        // This is a placeholder for your specific backend logic.
        list.innerHTML = "<p style='color:#555'>Inbox Empty / Connect Backend</p>";
    }

    function deleteSession(email) {
        let sessions = JSON.parse(localStorage.getItem('vulcan_sessions') || "[]");
        sessions = sessions.filter(s => s !== email);
        localStorage.setItem('vulcan_sessions', JSON.stringify(sessions));
        loadStoredSessions();
    }

    function copyEmail() {
        navigator.clipboard.writeText(activeEmail);
        alert("Copied!");
    }
</script>
</body>
</html>
